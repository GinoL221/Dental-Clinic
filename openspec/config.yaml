project:
  name: Dental-Clinic
  slug: dental-clinic
  root: /home/ginopc/Desarrollo/Dental-Clinic
artifact_store:
  mode: hybrid
strict_tdd: true
initialized_at: "2026-07-02"
source:
  project_context_topic_key: sdd-init/dental-clinic
  memory_backend: engram
stack:
  frontend:
    runtime: Node.js
    framework: SvelteKit 2 + Svelte 4 + Vite 5
    package_manager: npm
    test_runner:
      command: npm run test
      framework: Vitest + Playwright
  backend:
    runtime: Java 21
    framework: Spring Boot 3.2.1
    build_tool: Maven
    test_runner:
      command: mvn test
      framework: Spring Boot Test / Maven Surefire
phase_rules:
  proposal:
    interactive_questions_required: true
  specs:
    require_proposal_artifact: true
  design:
    require_proposal_artifact: true
  tasks:
    require_spec_and_design_artifacts: true
  apply:
    require_tasks_artifact: true
    strict_tdd: true
  verify:
    require_spec_and_tasks_and_apply_progress: true
  archive:
    require_all_artifacts: true
testing:
  frontend:
    command: npm run test
    notes:
      - Vitest unit/component tests (npm run test, npm run test:watch) via frontend/package.json.
      - Playwright E2E tests via npm run test:e2e (boots tests/mock-backend.js + preview build).
      - Type safety via npm run check (svelte-check) and npm run typecheck (tsc -p jsconfig.json).
  backend:
    command: mvn test
    notes:
      - Uses Maven Surefire with Spring Boot Test.
notes:
  - Existing openspec/changes content was preserved.
  - No application code was modified during initialization.
