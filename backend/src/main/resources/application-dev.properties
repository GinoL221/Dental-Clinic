# Configuración para el profile "dev" (usar en desarrollo local)
spring.h2.console.enabled=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:dental1
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Deshabilitar import.sql — los datos demo los carga DataInitializer
spring.jpa.properties.hibernate.hbm2ddl.import_files=

# JWT secret — debe inyectarse via variable de entorno, sin valor de fallback (igual que en prod)
app.jwt.secret=${JWT_SECRET}
