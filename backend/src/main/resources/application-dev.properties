# Configuración para el profile "dev" (usar en desarrollo local)
spring.h2.console.enabled=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:dental1
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Deshabilitar import.sql — los datos demo los carga DataInitializer
spring.jpa.properties.hibernate.hbm2ddl.import_files=

# JWT secret — en local se puede usar el valor de fallback; en prod se inyecta via env var
app.jwt.secret=${JWT_SECRET:8ad092958a30cf3dc2fef685c2ff7ba32f350433886227fbefaf5d6d49f36294}
