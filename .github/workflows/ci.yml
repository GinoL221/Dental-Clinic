name: CI

on:
  push:
    branches: [ 'main', 'master', 'develop', 'fix/ui-dates-logger' ]
  pull_request:
    branches: [ 'main', 'master', 'develop' ]

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Show Java info
        run: java -version

      - name: Run backend tests using system Maven
        run: mvn -B -f backend/pom.xml test

  frontend:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          SESSION_SECRET: ci-test-secret
        run: npm test
